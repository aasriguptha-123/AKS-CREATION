# Deploy to Azure Kubernetes Service
# Build and push image to Azure Container Registry; Deploy to Azure Kubernetes Service
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger: none

resources:
- repo: self

variables:

  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '08891040-c649-4d02-abf3-0be08bda7b0d'
  imageRepository: 'php-app'
  containerRegistry: 'aksdemoclusteracr.azurecr.io'
  dockerfilePath: 'AKS-HPA/Dockerfile'
  tag: '$(Build.BuildId)'
  imagePullSecret: 'aksdemoclusteracr8924e072-auth'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'


stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(Build.BuildId)
    - script: |
          echo "Inside AKS-HPA:"
          ls -R AKS-HPA
          echo "Present working directory"
          pwd
          echo "Directory details"
          ls -l
          echo "Inside kube-manifests:"
          ls -l AKS-HPA/kube-manifests
      displayName: DEBUG DEEP

      
- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build

  jobs:
  - deployment: Deploy
    displayName: Deploy
    pool:
      vmImage: $(vmImageName)
    environment: 'aasriguptha123AKSCREATION-2091.default'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self 
          - task: KubernetesManifest@1
            displayName: Create imagePullSecret
            inputs:
              action: createSecret
              secretName: $(imagePullSecret)
              dockerRegistryEndpoint: $(dockerRegistryServiceConnection)

          - task: KubernetesManifest@1
            displayName: Deploy to Kubernetes cluster
            inputs:
              action: deploy
              manifests: |
                  $(System.DefaultWorkingDirectory)/AKS-HPA/kube-manifests/php-deployment.yml
                  $(System.DefaultWorkingDirectory)/AKS-HPA/kube-manifests/apache-hpa.yml
              imagePullSecrets: |
                $(imagePullSecret)
              containers: |
                $(containerRegistry)/$(imageRepository):$(Build.BuildId)

